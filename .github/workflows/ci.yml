name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: |
            backend/pyproject.toml
            backend/uv.lock
      - run: uv sync --locked
      - run: uv run ruff check app/
      - run: uv run ruff format --check app/

  backend-security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: |
            backend/pyproject.toml
            backend/uv.lock
      - run: uv sync --locked --no-dev
      - run: uv run --locked --no-dev --with pip-audit pip-audit

  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: |
            backend/pyproject.toml
            backend/uv.lock
      - run: uv sync --locked
      - run: uv run pytest --cov=app --cov-report=term-missing

  backend-test-postgres:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: onebase
          POSTGRES_PASSWORD: onebase
          POSTGRES_DB: onebase_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U onebase -d onebase_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql://onebase:onebase@localhost:5432/onebase_test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: |
            backend/pyproject.toml
            backend/uv.lock
      # Force serial: the per-test create_all/drop_all autouse fixture would
      # race across xdist workers against the shared Postgres database.
      - run: uv sync --locked
      - run: uv run pytest -m "not slow" -n 0

  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run build

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run test
